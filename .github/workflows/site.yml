name: Build landing site

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "generate_site.py"
      - "summary.json"
      - ".github/workflows/site.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python generate_site.py

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Update site (${{ github.sha }})"

      - name: Ping IndexNow
        if: success()
        env:
          KEY: 64688c05b4a69e9e4b9821850f22cc69
          HOST: cloudipdb.io
        run: |
          python3 <<'PY' > /tmp/indexnow.json
          import json, os
          host = os.environ["HOST"]
          key = os.environ["KEY"]
          urls = [u.strip() for u in open("site/indexnow-urls.txt") if u.strip()]
          print(json.dumps({
              "host": host,
              "key": key,
              "keyLocation": f"https://{host}/{key}.txt",
              "urlList": urls,
          }))
          PY
          curl -sS -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data-binary @/tmp/indexnow.json \
            -w "\nIndexNow HTTP %{http_code}\n" || true
